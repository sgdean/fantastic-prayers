<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Fantastic Prayers</title>

<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  background:#000;
  color:#eaeaea;
  font-family:Helvetica, Arial, sans-serif;
  text-align:center;
}

.container{
  line-height:1.6;
}

.title{
  font-size:28px;
  letter-spacing:.04em;
}

.years{
  font-size:16px;
  opacity:.6;
  margin-top:6px;
}

.whisper{
  font-size:14px;
  opacity:.45;
  margin-top:6px;
  letter-spacing:.03em;
}

.enter{
  margin-top:28px;
  font-size:16px;
  cursor:pointer;
}

.enter:hover{
  opacity:.8;
}
</style>
</head>

<body>

<div class="container">
  <div class="title">Fantastic Prayers</div>
  <div class="years">1998 / 2026</div>
  <div class="whisper">An excavation</div>

  <div class="enter" onclick="enterSite()">Enter</div>
</div>

<script>
  
function enterSite(){

  const password = prompt("Enter password")

  if(password === "kk"){
    window.location.href = "./walls/index.html"
  } else {
    alert("Incorrect password")
  }

}
</script>

</body>
</html>
