<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Fantastic Prayers</title>

<style>
body{
  margin:0;
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  background:#000;
  color:#eaeaea;
  font-family:Helvetica, Arial, sans-serif;
  text-align:center;
}

.container{
  line-height:1.6;
  padding:24px;
}

.title{
  font-size:28px;
  letter-spacing:.04em;
}

.years{
  font-size:16px;
  opacity:.6;
  margin-top:6px;
}

.whisper{
  font-size:14px;
  opacity:.45;
  margin-top:6px;
  letter-spacing:.03em;
}

.enter{
  margin-top:28px;
  font-size:16px;
  cursor:pointer;
}

.enter:hover{
  opacity:.8;
}

.utility-link{
  margin-top:56px;
  font-size:12px;
  opacity:.38;
}

.utility-link a{
  color:inherit;
  text-decoration:none;
  cursor:pointer;
}

.utility-link a:hover{
  opacity:.8;
}
</style>
</head>

<body>

<div class="container">
  <div class="title">Fantastic Prayers</div>
  <div class="years">1998 / 2026</div>
  <div class="whisper">An excavation</div>

  <div class="enter" onclick="enterWalls()">Enter</div>

  <div class="utility-link">
    <a href="#" onclick="enterCatalog(event)">Walls asset reference</a>
  </div>
</div>

<script>
function askPassword(){
  return prompt("Enter password")
}

function enterWalls(){
  const password = askPassword()

  if(password === null) return

  if(password === "kk"){
    window.location.href = "./world/index.html"
  } else {
    alert("Incorrect password")
  }
}

function enterCatalog(event){
  event.preventDefault()

  const password = askPassword()

  if(password === null) return

  if(password === "kk"){
    window.location.href = "./catalog/index.html"
  } else {
    alert("Incorrect password")
  }
}
</script>

</body>
</html>
