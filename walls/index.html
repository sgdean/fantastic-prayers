/* ---------- FIT / ZOOM / PAN ---------- */

let baseScale = 1
let userScale = 1
let panX = 0
let panY = 0

function clamp(value, min, max){
  return Math.min(max, Math.max(min, value))
}

function fitStage(){
  baseScale = Math.max(window.innerWidth / STAGE_W, window.innerHeight / STAGE_H)
  applyTransform()
}

function applyTransform(){
  const scale = baseScale * userScale
  const scaledW = STAGE_W * scale
  const scaledH = STAGE_H * scale

  const maxPanX = Math.max(0, (scaledW - window.innerWidth) / 2)
  const maxPanY = Math.max(0, (scaledH - window.innerHeight) / 2)

  panX = clamp(panX, -maxPanX, maxPanX)
  panY = clamp(panY, -maxPanY, maxPanY)

  stageWrap.style.transform = `translate(${panX}px, ${panY}px) scale(${scale})`

}

function resetZoom(){
  userScale = 1
  panX = 0
  panY = 0
  applyTransform()
}

/* ---------- AUDIO HELPERS ---------- */

function fadeAudioIn(audio, target = 1, ms = 300) {
  audio.volume = 0
  const steps = 20
  const stepMs = ms / steps
  let i = 0
  const id = setInterval(() => {
    i++
    audio.volume = Math.min(target, (target * i) / steps)
    if (i >= steps) clearInterval(id)
  }, stepMs)
}

function fadeAudioOut(audio, ms = 300) {
  const startVol = audio.volume
  const steps = 20
  const stepMs = ms / steps
  let i = 0
  const id = setInterval(() => {
    i++
    audio.volume = Math.max(0, startVol * (1 - i / steps))
    if (i >= steps) {
      clearInterval(id)
      audio.pause()
      audio.currentTime = 0
      audio.volume = 1
    }
  }, stepMs)
}

function ambientVolumeForCount(count){
  if (count <= 1) return 1
  if (count === 2) return 0.5
  if (count === 3) return 0.33
  if (count === 4) return 0.25
  return 0.2
}

function updateAmbientVolumes(){
  const active = ambientChannels.filter(ch => !ch.fading)
  const volume = ambientVolumeForCount(active.length)
  active.forEach(ch => {
    ch.audio.volume = volume
  })
}

function removeAmbientChannel(channel){
  const i = ambientChannels.indexOf(channel)
  if(i > -1) ambientChannels.splice(i, 1)
  updateAmbientVolumes()
}

function fadeOutAndRemove(channel, ms = 700){
  if (!channel || channel.fading) return

  channel.fading = true

  const audio = channel.audio
  const startVol = audio.volume
  const steps = 20
  const stepMs = ms / steps
  let i = 0

  const id = setInterval(() => {
    i++
    const nextVol = Math.max(0, startVol * (1 - i / steps))
    audio.volume = nextVol

    if (i >= steps) {
      clearInterval(id)
      audio.pause()
      audio.currentTime = 0
      removeAmbientChannel(channel)
    }
  }, stepMs)
}

function stopAllAmbientSounds(){
  ambientChannels.slice().forEach(ch => fadeOutAndRemove(ch, 200))
}

function startAmbientSound(name, source = "pointer"){
  const sound = ambientSounds[name]
  if (!sound) return

  const already = ambientChannels.find(ch => ch.name === name)

  if (already) {
    if (already.loop) {
      fadeOutAndRemove(already, 200)
    }
    return
  }

  if (ambientChannels.length >= MAX_AMBIENT_CHANNELS) {
    const victim = ambientChannels[Math.floor(Math.random() * ambientChannels.length)]
    fadeOutAndRemove(victim, 140)
  }

  const audio = new Audio(sound.file)
  const channel = {
    name,
    audio,
    loop: sound.loop,
    source,
    fading: false
  }

  audio.loop = sound.loop
  ambientChannels.push(channel)
  updateAmbientVolumes()

  audio.play().catch(() => {})

  if (!sound.loop) {
    audio.onended = () => {
      removeAmbientChannel(channel)
    }
  }
}

function getAmbientMatches(x, y){
  const matches = []

  for (const name in ambientSounds){
    const frameEntry = ambientSounds[name].map[currentFrame]
    if (!frameEntry) continue

    const boxes = Array.isArray(frameEntry) ? frameEntry : [frameEntry]

    const hit = boxes.some(rect =>
      x >= rect.x &&
      x <= rect.x + rect.w &&
      y >= rect.y &&
      y <= rect.y + rect.h
    )

    if (hit) {
      matches.push(name)
    }
  }

  return matches
}

function checkAmbientHotspots(x, y, source = "pointer"){
  const matches = getAmbientMatches(x, y)
  const currentMatches = new Set(matches)

  if (source === "pointer") {
    matches.forEach(name => {
      if (!activePointerAmbientMatches.has(name)) {
        startAmbientSound(name, source)
      }
    })

    activePointerAmbientMatches = currentMatches
    return
  }

  matches.forEach(name => startAmbientSound(name, source))
}

function nextFrame(){
  if(playing) return

  const oldFrame = currentFrame

  currentFrame++
  if(currentFrame > totalFrames) currentFrame = 1

  if (oldFrame === 23 && currentFrame === 1) {
    mkArmed = true
    nakedArmed = true
  }

  updateFrame()
}

function prevFrame(){
  if(playing) return

  const oldFrame = currentFrame

  currentFrame--
  if(currentFrame < 1) currentFrame = totalFrames

  if (oldFrame === 1 && currentFrame === 23) {
    mkArmed = true
    nakedArmed = true
  }

  updateFrame()
}

/* ---------- SUCKLING SEQUENCE ---------- */

function playSucklingSequence(){
  if(playing) return
  if(currentFrame !== 10) return

  stopAllAmbientSounds()

  playing = true
  seqIndex = 0
  hotspot.style.display = "none"

  videoFull.src = sucklingSequence[0]
  videoFull.currentTime = 0
  videoFull.style.display = "block"

  const startNight = () => {
    frame.style.display = "none"
    videoFull.play()
    videoFull.removeEventListener("canplay", startNight)
  }

  videoFull.addEventListener("canplay", startNight)
  videoFull.load()

  videoFull.onended = () => {
    if(seqIndex === 0){
      videoWindow.src = sucklingSequence[1]
      videoWindow.currentTime = 0
      videoWindow.style.display = "block"
      videoWindow.play()
      seqIndex = 1
    } else if(seqIndex === 2){
      resetSequence()
    }
  }

  videoWindow.onended = () => {
    videoFull.src = sucklingSequence[2]
    videoFull.currentTime = 0
    videoFull.style.display = "block"

    const startNightRev = () => {
      videoWindow.style.display = "none"
      videoFull.play()
      seqIndex = 2
      videoFull.removeEventListener("canplay", startNightRev)
    }

    videoFull.addEventListener("canplay", startNightRev)
    videoFull.load()
  }
}

/* ---------- HEART ---------- */

function playHeart(startAudio = true){
  if (playing) return

  playing = true
  hotspot.style.display = "none"

  stopAllAmbientSounds()

  videoHeart.src = "media/heart.mp4"
  videoHeart.currentTime = 0
  videoHeart.style.display = "block"
  videoHeart.style.opacity = "0"

  const startHeart = () => {
    if (startAudio) {
      heartAudio.currentTime = 0
      heartAudio.play().catch(() => {})
      fadeAudioIn(heartAudio, 1, 260)
    }

    requestAnimationFrame(() => {
      videoHeart.style.opacity = "1"
    })

    videoHeart.pause()
    heartScrubActive = true

    videoHeart.removeEventListener("canplay", startHeart)
  }

  videoHeart.addEventListener("canplay", startHeart)
  videoHeart.load()

  videoHeart.onended = null
  videoFull.onended = null
  videoWindow.onended = null
}

function closeHeart(){
  if (!heartScrubActive) return

  heartScrubActive = false
  playing = false

  videoHeart.style.opacity = "0"
  fadeAudioOut(heartAudio, 260)

  setTimeout(() => {
    videoHeart.pause()
    videoHeart.currentTime = 0
    videoHeart.style.display = "none"
    frame.style.display = "block"
    updateFrame()
  }, 220)
}

function closeMK(advanceSequence = false){
  if (!mkActive) return

  mkActive = false
  playing = false

  videoMK.style.opacity = "0"

  setTimeout(() => {
    videoMK.pause()
    videoMK.currentTime = 0
    videoMK.style.display = "none"
  }, 520)

  if (advanceSequence) {
    nextMK = nextMK === 1 ? 2 : 1
  }

  frame.style.display = "block"
  updateFrame()
}

function moveToFrame(targetFrame, onArrival) {
  if (playing) return

  playing = true
  hotspot.style.display = "none"

  if (currentFrame === targetFrame) {
    onArrival()
    return
  }

  stage.classList.add("dragging")
  frame.classList.add("blurring")

  const step = currentFrame < targetFrame ? 1 : -1

  const move = () => {
    currentFrame += step
    updateFrame()

    if (currentFrame !== targetFrame) {
      setTimeout(move, 150)
    } else {
      stage.classList.remove("dragging")
      frame.classList.remove("blurring")
      onArrival()
    }
  }

  setTimeout(move, 120)
}

function moveToFrame15ThenPlayHeart(){
  moveToFrame(15, () => {
    setTimeout(() => {
      heartAudio.currentTime = 0
      heartAudio.play().catch(() => {})
      fadeAudioIn(heartAudio, 1, 260)

      setTimeout(() => {
        playing = false
        playHeart(false)
      }, 420)
    }, 700)
  })
}

/* ---------- MIKE KELLEY ---------- */

function moveToFrame3ThenPlayNakedGuy(){

/* ---------- NAKED GUY ---------- */

function playNakedGuyLarge(){

  nakedLargePending = false

  playing = true
  nakedActive = true
  nakedArmed = false
  hotspot.style.display = "none"

  videoNakedSmall.pause()
  videoNakedSmall.style.display = "none"

  videoNakedLarge.src = "media/naked-guy-large.mp4"
  videoNakedLarge.loop = true
  videoNakedLarge.currentTime = Math.random() * 8
  videoNakedLarge.style.display = "block"
  videoNakedLarge.style.opacity = "0"

  const start = () => {

    requestAnimationFrame(()=>{
      videoNakedLarge.style.opacity = "1"
    })

    playNakedLargeForward()

    videoNakedLarge.removeEventListener("canplay", start)
  }

  videoNakedLarge.addEventListener("canplay", start)
  videoNakedLarge.load()

  nakedLargePlayed = true
}

function playNakedGuySmall(){

  videoNakedSmall.pause()
  videoNakedSmall.currentTime = 0

  videoNakedSmall.src = "media/naked-guy-small.mp4"
  videoNakedSmall.loop = true
  videoNakedSmall.style.display = "block"
  videoNakedSmall.style.opacity = "0"

  const start = () => {

    requestAnimationFrame(()=>{
      videoNakedSmall.style.opacity = "1"
    })

    playNakedSmallForward()

    videoNakedSmall.removeEventListener("canplay", start)

  }

  videoNakedSmall.addEventListener("canplay", start, { once:true })
  videoNakedSmall.load()

}

function closeNakedGuy(){

  stopNakedLargeReverse()

  if (!nakedActive) return

  nakedActive = false
  playing = false

  videoNakedLarge.style.opacity = "0"

  setTimeout(()=>{

    videoNakedLarge.pause()
    videoNakedLarge.currentTime = 0
    videoNakedLarge.style.display = "none"

    if (nakedLargePlayed && currentFrame === 3){
      playNakedGuySmall()
    }

    updateFrame()

  },320)
}

function stopNakedLargeReverse(){
  if (nakedLargeReverseTimer) {
    clearInterval(nakedLargeReverseTimer)
    nakedLargeReverseTimer = null
  }
}

function stopNakedSmallReverse(){
  if (nakedSmallReverseTimer) {
    clearInterval(nakedSmallReverseTimer)
    nakedSmallReverseTimer = null
  }
}

function playNakedLargeForward(){
  stopNakedLargeReverse()
  nakedLargeDirection = 1
  videoNakedLarge.playbackRate = 1
  videoNakedLarge.play()
}

function playNakedSmallForward(){
  stopNakedSmallReverse()
  nakedSmallDirection = 1
  videoNakedSmall.playbackRate = 1
  videoNakedSmall.play()
}

function playNakedLargeReverse(){
  stopNakedLargeReverse()
  videoNakedLarge.pause()
  nakedLargeDirection = -1

  nakedLargeReverseTimer = setInterval(() => {
    const step = 1 / 30
    const duration = videoNakedLarge.duration || 0
    if (!duration) return

    let t = videoNakedLarge.currentTime - step
    if (t <= 0) t = duration
    videoNakedLarge.currentTime = t
  }, 33)
}

function playNakedSmallReverse(){
  stopNakedSmallReverse()
  videoNakedSmall.pause()
  nakedSmallDirection = -1

  nakedSmallReverseTimer = setInterval(() => {
    const step = 1 / 30
    const duration = videoNakedSmall.duration || 0
    if (!duration) return

    let t = videoNakedSmall.currentTime - step
    if (t <= 0) t = duration
    videoNakedSmall.currentTime = t
  }, 33)
}


/* ---------- HOTSPOT CLICK ---------- */

hotspot.addEventListener("pointerdown", e => {
  e.stopPropagation()
})

hotspot.addEventListener("click", e => {
  e.stopPropagation()

  if (playing) return

  if (currentFrame === 10) {
    playSucklingSequence()
    return
  }

  if (maps.heart[currentFrame]) {
    moveToFrame15ThenPlayHeart()
    return
  }

  if (maps.nakedGuy[currentFrame]) {
    if (!nakedArmed) return

    nakedLargePending = true

    stopNakedSmallReverse()
    videoNakedSmall.pause()
    videoNakedSmall.currentTime = 0
    videoNakedSmall.style.opacity = "0"
    videoNakedSmall.style.display = "none"

    moveToFrame3ThenPlayNakedGuy()
    return
}

  if (maps.buzzing[currentFrame]) {
    moveToFrame4ThenPlayBuzzing()
    return
  }

  if (maps.mikeKelley[currentFrame]) {
  if (!mkArmed) return
  moveToFrame21ThenPlayMK()
  return
}
})

/* ---------- HEART SCRUB ---------- */

videoHeart.addEventListener("pointerdown", e => {
  if (!heartScrubActive) return
  e.stopPropagation()
  heartScrubLastX = e.clientX
})

videoHeart.addEventListener("pointermove", e => {
  if (!heartScrubActive) return
  if (!(e.buttons & 1)) return

  const dx = e.clientX - heartScrubLastX
  heartScrubLastX = e.clientX

  const duration = videoHeart.duration || 0
  if (!duration) return

  let newTime = videoHeart.currentTime + dx * heartScrubSpeed

  while (newTime < 0) newTime += duration
  while (newTime > duration) newTime -= duration

  videoHeart.currentTime = newTime
})

videoHeart.addEventListener("dblclick", e => {
  if (!heartScrubActive) return
  e.stopPropagation()
  closeHeart()
})

videoBuzzing.addEventListener("dblclick", e => {
  if (!buzzingActive) return
  e.stopPropagation()
  closeBuzzing()
})

videoMK.addEventListener("dblclick", e => {
  if (!mkActive) return
  e.stopPropagation()
  closeMK(false)
})

videoNakedLarge.addEventListener("pointerdown", e => {
  e.stopPropagation()

  if (nakedLargeDirection === 1) {
    playNakedLargeReverse()
  } else {
    playNakedLargeForward()
  }
})

videoNakedSmall.addEventListener("pointerdown", e => {
  e.stopPropagation()

  if (nakedSmallDirection === 1) {
    playNakedSmallReverse()
  } else {
    playNakedSmallForward()
  }
})

/* ---------- AMBIENT HOVER / TOUCH ---------- */

stage.addEventListener("mousemove", e => {
  const rect = stage.getBoundingClientRect()

  const stageX = ((e.clientX - rect.left) / rect.width) * STAGE_W
  const stageY = ((e.clientY - rect.top) / rect.height) * STAGE_H

  lastMouseStageX = stageX
  lastMouseStageY = stageY
  mouseInsideStage = true

  if (!playing && !heartScrubActive && !buzzingActive) {
    checkAmbientHotspots(stageX, stageY, "pointer")
  }
})

stage.addEventListener("mouseleave", () => {
  mouseInsideStage = false
  lastMouseStageX = null
  lastMouseStageY = null
  activePointerAmbientMatches.clear()
})

stage.addEventListener("touchstart", e => {
  if (playing || heartScrubActive || buzzingActive) return

  touchTapStartX = e.touches[0].clientX
  touchTapStartY = e.touches[0].clientY
  touchTapMoved = false
})

stage.addEventListener("touchmove", e => {
  const dx = e.touches[0].clientX - touchTapStartX
  const dy = e.touches[0].clientY - touchTapStartY

  if (Math.abs(dx) > touchTapThreshold || Math.abs(dy) > touchTapThreshold) {
    touchTapMoved = true
  }
})

stage.addEventListener("touchend", e => {
  if (playing || heartScrubActive || buzzingActive) return
  if (touchTapMoved) return

  const rect = stage.getBoundingClientRect()
  const stageX = ((e.changedTouches[0].clientX - rect.left) / rect.width) * STAGE_W
  const stageY = ((e.changedTouches[0].clientY - rect.top) / rect.height) * STAGE_H

  const matches = getAmbientMatches(stageX, stageY)
  matches.forEach(name => startAmbientSound(name, "touch"))

  touchTapMoved = false
})

stage.addEventListener("touchcancel", () => {
  touchTapMoved = false
})


/* ---------- POINTER INTERACTION ---------- */

let pointers = new Map()

let dragging = false
let dragLastStepX = 0
const dragThreshold = 110

let pinching = false
let pinchStartDistance = 0
let pinchStartScale = 1
let pinchStartCenter = null
let pinchStartPanX = 0
let pinchStartPanY = 0

function getDistance(a, b){
  const dx = a.clientX - b.clientX
  const dy = a.clientY - b.clientY
  return Math.sqrt(dx * dx + dy * dy)
}

function getCenter(a, b){
  return {
    x: (a.clientX + b.clientX) / 2,
    y: (a.clientY + b.clientY) / 2
  }
}

function stopDrag(){
  dragging = false
  stage.classList.remove("dragging")
  frame.classList.remove("blurring")
}

stage.addEventListener("pointerdown", e => {
  if (e.target === hotspot) return

  if (heartScrubActive) {
    if (e.target === videoHeart) {
      heartScrubLastX = e.clientX
      return
    } else {
      closeHeart()
      return
    }
  }

  if (buzzingActive) {
    if (e.target === videoBuzzing) {
      return
    } else {
      closeBuzzing()
      return
    }
  }

    if (mkActive) {
    if (e.target === videoMK) {
      return
    } else {
      closeMK(false)
    }
  }

    if (nakedActive) {
      if (e.target === videoNakedLarge || e.target === videoNakedSmall) {
        return
      } else {
        closeNakedGuy()
      }
    }


  if (playing) return

  pointers.set(e.pointerId, e)
  stage.setPointerCapture(e.pointerId)

  if (pointers.size === 1){
    dragging = true
    dragLastStepX = e.clientX
    stage.classList.add("dragging")
    frame.classList.add("blurring")
  }

  if (pointers.size === 2){
    pinching = true
    stopDrag()

    const pts = Array.from(pointers.values())
    pinchStartDistance = getDistance(pts[0], pts[1])
    pinchStartScale = userScale
    pinchStartCenter = getCenter(pts[0], pts[1])
    pinchStartPanX = panX
    pinchStartPanY = panY
  }
})

stage.addEventListener("pointermove", e => {
  if (!pointers.has(e.pointerId)) return
  pointers.set(e.pointerId, e)

  if (playing && !heartScrubActive && !buzzingActive && !mkActive) return

  if (pointers.size === 2 && pinching){
    const pts = Array.from(pointers.values())
    const dist = getDistance(pts[0], pts[1])
    const center = getCenter(pts[0], pts[1])

    userScale = clamp((dist / pinchStartDistance) * pinchStartScale, 1, 4)
    panX = pinchStartPanX + (center.x - pinchStartCenter.x)
    panY = pinchStartPanY + (center.y - pinchStartCenter.y)

    applyTransform()
    return
  }

  if (pointers.size === 1 && dragging){
    const dx = e.clientX - dragLastStepX

    if(dx > dragThreshold){
      prevFrame()
      dragLastStepX = e.clientX
    }

    if(dx < -dragThreshold){
      nextFrame()
      dragLastStepX = e.clientX
    }
  }
})

function endPointer(e){
  pointers.delete(e.pointerId)

  if (pointers.size < 2){
    pinching = false
  }

  if (pointers.size === 1 && !playing){
    const remaining = Array.from(pointers.values())[0]
    dragging = true
    dragLastStepX = remaining.clientX
    stage.classList.add("dragging")
    frame.classList.add("blurring")
  }

  if (pointers.size === 0){
    stopDrag()
  }
}

stage.addEventListener("pointerup", endPointer)
stage.addEventListener("pointercancel", endPointer)
stage.addEventListener("pointerleave", endPointer)

/* ---------- WHEEL ZOOM ---------- */

stage.addEventListener("wheel", e => {
  e.preventDefault()

  const rect = stageWrap.getBoundingClientRect()
  const mouseX = e.clientX - (rect.left + rect.width / 2)
  const mouseY = e.clientY - (rect.top + rect.height / 2)

  const oldScale = baseScale * userScale

  if (e.deltaY < 0) {
    userScale = clamp(userScale * 1.08, 1, 4)
  } else {
    userScale = clamp(userScale / 1.08, 1, 4)
  }

  const newScale = baseScale * userScale
  const scaleRatio = newScale / oldScale

  panX = (panX - mouseX) * scaleRatio + mouseX
  panY = (panY - mouseY) * scaleRatio + mouseY

  applyTransform()
}, { passive:false })

/* ---------- DOUBLE TAP / DOUBLE CLICK RESET ---------- */

let lastTap = 0
stage.addEventListener("click", () => {
  const now = Date.now()
  if (now - lastTap < 280 && userScale > 1.02){
    resetZoom()
  }
  lastTap = now
})

/* ---------- HOTSPOT MAPPER KEYS ---------- */

document.addEventListener("keydown", e => {
  if (e.key === "m" || e.key === "M") {
    mapperMode = !mapperMode
    drawMapperBox()
    return
  }

const mapNames = ["heart", "buzzing", "drum", "noNotThat", "doorCreak", "whisper1", "whisper2","listen","mikeKelley","nakedGuy"]
let currentIndex = mapNames.indexOf(currentMapName)

if (e.key === "[") {
  currentIndex = (currentIndex - 1 + mapNames.length) % mapNames.length
  currentMapName = mapNames[currentIndex]
  drawMapperBox()
  return
}

if (e.key === "]") {
  currentIndex = (currentIndex + 1) % mapNames.length
  currentMapName = mapNames[currentIndex]
  drawMapperBox()
  return
}

  if (!mapperMode) return

  const map = currentMap()

  if (!map[currentFrame]) {
    map[currentFrame] = { x: 200, y: 150, w: 120, h: 120 }
  }

  const r = map[currentFrame]
  const moveStep = e.shiftKey ? 5 : 1
  const resizeStep = e.shiftKey ? 20 : 4

  if (e.key === "ArrowLeft" && !e.altKey) r.x -= moveStep
  if (e.key === "ArrowRight" && !e.altKey) r.x += moveStep
  if (e.key === "ArrowUp" && !e.altKey) r.y -= moveStep
  if (e.key === "ArrowDown" && !e.altKey) r.y += moveStep

  if (e.altKey && e.key === "ArrowLeft") r.w = Math.max(1, r.w - resizeStep)
  if (e.altKey && e.key === "ArrowRight") r.w += resizeStep
  if (e.altKey && e.key === "ArrowUp") r.h = Math.max(1, r.h - resizeStep)
  if (e.altKey && e.key === "ArrowDown") r.h += resizeStep

  if (e.key === "c" || e.key === "C") {
    console.log(currentMapName + " =", JSON.stringify(map, null, 2))
  }

  drawMapperBox()
})

/* ---------- GLOBAL ---------- */

document.addEventListener("touchmove", e => {
  e.preventDefault()
}, { passive:false })

window.addEventListener("resize", fitStage)

setTimeout(() => hint.style.opacity = 0, 5000)

updateMapLabel()
fitStage()
updateFrame()
