<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Suburbia</title>
  <style>
    :root {
      --debug-bg: rgba(0, 0, 0, 0.78);
      --debug-fg: #d8ffd8;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      position: fixed;
      inset: 0;
      touch-action: none;
    }

    @media (pointer: fine) {
      body {
        cursor: none;
      }
    }

    #viewport {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    #stageWrap {
      position: relative;
      width: 640px;
      height: 480px;
      transform-origin: center center;
      will-change: transform;
    }

    #app {
      position: relative;
      width: 640px;
      height: 480px;
      overflow: hidden;
      background: #000;
      touch-action: none;
    }

    #bg {
      position: absolute;
      left: 0;
      top: 0;
      width: 640px;
      height: 480px;
      user-select: none;
      -webkit-user-drag: none;
      pointer-events: none;
    }

    #valleyCanvas {
      position: absolute;
      left: 0;
      top: 0;
      width: 640px;
      height: 480px;
      pointer-events: none;
      z-index: 20;
    }

    #joe {
      position: absolute;
      left: 320px;
      top: 240px;
      width: 80px;
      height: 100px;
      object-fit: cover;
      transform: translate(-50%, -50%) scale(1);
      transform-origin: center center;
      pointer-events: none;
      z-index: 30;
      opacity: 1;
      will-change: transform, opacity, filter;
      background: transparent;
      display: block;
    }

    #debug {
      position: fixed;
      top: 12px;
      left: 12px;
      z-index: 100;
      min-width: 260px;
      padding: 10px 12px;
      background: var(--debug-bg);
      color: var(--debug-fg);
      border: 1px solid rgba(143, 232, 143, 0.45);
      border-radius: 8px;
      font: 12px/1.35 Menlo, Monaco, Consolas, monospace;
      white-space: pre-wrap;
      pointer-events: none;
      display: none;
    }

    #startOverlay,
    #messageOverlay {
      position: absolute;
      inset: 0;
      z-index: 200;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: rgba(0, 0, 0, 0.72);
      color: #fff;
      text-align: center;
    }

    #startPanel,
    #messagePanel {
      max-width: 720px;
      padding: 22px 24px;
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 12px;
      background: rgba(0, 0, 0, 0.76);
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.35);
    }

    #startPanel h1,
    #messagePanel h2 {
      margin: 0 0 10px;
      font-size: 24px;
      line-height: 1.1;
      font-weight: 700;
    }

    #startPanel p,
    #messagePanel p {
      margin: 0 0 10px;
      font-size: 15px;
      line-height: 1.45;
      color: rgba(255, 255, 255, 0.88);
    }

    #startButton {
      margin-top: 12px;
      padding: 12px 16px;
      border: 0;
      border-radius: 8px;
      background: #fff;
      color: #000;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
    }

    .hidden {
      display: none !important;
    }
  </style>
</head>
<body>
  <div id="viewport">
    <div id="stageWrap">
      <div id="app">
        <img id="bg" alt="" />
        <canvas id="valleyCanvas"></canvas>

        <video
          id="joe"
          src="./video/joe.mp4"
          playsinline
          loop
          preload="auto"
        ></video>

        <div id="debug"></div>

        <div id="startOverlay">
          <div id="startPanel">
            <h1>Suburbia prototype</h1>
            <p>Click to enter Suburbia.</p>
            <button id="startButton">Enter Suburbia</button>
          </div>
        </div>

        <div id="messageOverlay" class="hidden">
          <div id="messagePanel">
            <h2>Shuttle complete</h2>
            <p>Suburbia has returned to anchor frame 016.</p>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const DEBUG = false;

    const CONFIG = {
      frameCount: 20,
      entryFrame: 16,
      frameDurationMs: 680,
      shuttleFrameDurationMs: 90,

      joeBaseWidth: 80,
      joeBaseHeight: 100,
      joeMaxScale: 1.0,
      joeMinScale: 0.03,
      exitThreshold: 0.05,

      exitArmingDelayMs: 2200,
      exitMovementThreshold: 24,

      valleys: [
        { x: 0.28, y: 0.58, radius: 0.24, depth: 1.20 },
        { x: 0.76, y: 0.30, radius: 0.26, depth: 1.38 }
      ],

      debug: {
        overlay: false,
        valleys: false
      }
    };

    const STAGE_W = 640;
    const STAGE_H = 480;

    const state = {
      mode: "boot", // boot | drift | shuttle | complete
      currentFrame: CONFIG.entryFrame,
      mouseX: 96,
      mouseY: 240,
      exitLockUntil: 0,
      entryMouseX: 96,
      entryMouseY: 240,
      hasMovedSinceUnlock: false,
      joeScale: 1,
      topoValue: 0,
      frameTimerId: null,
      hasStarted: false
    };

    const els = {
      app: document.getElementById("app"),
      stageWrap: document.getElementById("stageWrap"),
      bg: document.getElementById("bg"),
      joe: document.getElementById("joe"),
      debug: document.getElementById("debug"),
      valleyCanvas: document.getElementById("valleyCanvas"),
      startOverlay: document.getElementById("startOverlay"),
      startButton: document.getElementById("startButton"),
      messageOverlay: document.getElementById("messageOverlay")
    };

    const ctx = els.valleyCanvas.getContext("2d");
    const loadedImages = new Map();

    function clamp(value, min, max) {
      return Math.max(min, Math.min(max, value));
    }

    function lerp(a, b, t) {
      return a + (b - a) * t;
    }

    function smoothstep(edge0, edge1, x) {
      const t = clamp((x - edge0) / (edge1 - edge0), 0, 1);
      return t * t * (3 - 2 * t);
    }

    function fitStage() {
      const scale = Math.min(window.innerWidth / STAGE_W, window.innerHeight / STAGE_H);
      els.stageWrap.style.transform = `scale(${scale})`;
    }

    function frameToFilename(frameNum) {
      return `./images/suburbia_${String(frameNum).padStart(3, "0")}.png`;
    }

    function nextFrame(frameNum) {
      return frameNum >= CONFIG.frameCount ? 1 : frameNum + 1;
    }

    async function preloadImages() {
      const promises = [];

      for (let i = 1; i <= CONFIG.frameCount; i++) {
        const src = frameToFilename(i);

        promises.push(
          new Promise((resolve, reject) => {
            const img = new Image();
            img.onload = () => {
              loadedImages.set(i, img);
              resolve();
            };
            img.onerror = reject;
            img.src = src;
          })
        );
      }

      return Promise.all(promises);
    }

    function renderFrame(frameNum) {
      state.currentFrame = frameNum;
      const img = loadedImages.get(frameNum);
      if (!img) return;
      els.bg.src = img.src;
    }

    function resizeCanvas() {
      els.valleyCanvas.width = STAGE_W;
      els.valleyCanvas.height = STAGE_H;
      fitStage();
      drawValleyOverlay();
      updateJoe();
      updateDebug();
    }

    function getNormalizedMouse() {
      return {
        x: clamp(state.mouseX / STAGE_W, 0, 1),
        y: clamp(state.mouseY / STAGE_H, 0, 1)
      };
    }

    function computeTopographyAt(nx, ny) {
      let total = 0;

      for (const valley of CONFIG.valleys) {
        const dx = nx - valley.x;
        const dy = ny - valley.y;
        const dist = Math.sqrt(dx * dx + dy * dy);

        const influence = Math.exp(-((dist * dist) / (2 * valley.radius * valley.radius)));
        total += influence * valley.depth;
      }

      const normalized = clamp(total / 1.45, 0, 1);
      const shaped = Math.pow(normalized, 0.9);

      return shaped;
    }

    function computeJoeScale(topoValue) {
      const delayed = smoothstep(0.35, 1, topoValue);
      return lerp(CONFIG.joeMaxScale, CONFIG.joeMinScale, delayed);
    }

    function positionJoe() {
      const descent = state.topoValue;
      const yOffset = descent * 28;
      const blur = descent * 1.2;
      const volume = 1 - descent * 0.65;

      els.joe.style.left = `${state.mouseX}px`;
      els.joe.style.top = `${state.mouseY + yOffset}px`;
      els.joe.style.opacity = "1";
      els.joe.style.filter = `blur(${blur}px)`;
      els.joe.style.transform = `translate(-50%, -50%) scale(${state.joeScale})`;

      els.joe.volume = Math.max(0.2, volume);
    }

    function updateJoe() {
      const { x, y } = getNormalizedMouse();
      state.topoValue = computeTopographyAt(x, y);
      state.joeScale = computeJoeScale(state.topoValue);
      positionJoe();

      const exitUnlocked =
        performance.now() >= state.exitLockUntil &&
        state.hasMovedSinceUnlock;

      if (
        state.mode === "drift" &&
        exitUnlocked &&
        state.joeScale <= CONFIG.exitThreshold
      ) {
        beginExit();
      }
    }

    function drawValleyOverlay() {
      ctx.clearRect(0, 0, els.valleyCanvas.width, els.valleyCanvas.height);

      if (!CONFIG.debug.valleys) return;

      const w = els.valleyCanvas.width;
      const h = els.valleyCanvas.height;

      for (const valley of CONFIG.valleys) {
        const x = valley.x * w;
        const y = valley.y * h;
        const r = valley.radius * Math.min(w, h);

        const gradient = ctx.createRadialGradient(x, y, 0, x, y, r);
        gradient.addColorStop(0, "rgba(120, 255, 120, 0.28)");
        gradient.addColorStop(0.5, "rgba(120, 255, 120, 0.12)");
        gradient.addColorStop(1, "rgba(120, 255, 120, 0.02)");

        ctx.fillStyle = gradient;
        ctx.beginPath();
        ctx.arc(x, y, r, 0, Math.PI * 2);
        ctx.fill();

        ctx.strokeStyle = "rgba(160, 255, 160, 0.9)";
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.arc(x, y, 4, 0, Math.PI * 2);
        ctx.stroke();

        ctx.strokeStyle = "rgba(160, 255, 160, 0.28)";
        ctx.beginPath();
        ctx.arc(x, y, r, 0, Math.PI * 2);
        ctx.stroke();
      }
    }

    function updateDebug() {
      const debugOn = DEBUG && CONFIG.debug.overlay;
      els.debug.style.display = debugOn ? "block" : "none";
      if (!debugOn) return;

      const belowThreshold = state.joeScale <= CONFIG.exitThreshold ? "yes" : "no";
      const exitUnlocked =
        performance.now() >= state.exitLockUntil &&
        state.hasMovedSinceUnlock;
      const displayed = `suburbia_${String(state.currentFrame).padStart(3, "0")}.png`;

      els.debug.textContent =
`Environment: Suburbia
Mode: ${state.mode}
Current frame: ${String(state.currentFrame).padStart(3, "0")}
Displayed image: ${displayed}
Anchor frame: ${String(CONFIG.entryFrame).padStart(3, "0")}
Mouse X: ${Math.round(state.mouseX)}
Mouse Y: ${Math.round(state.mouseY)}
Topography value: ${state.topoValue.toFixed(3)}
Joe scale: ${state.joeScale.toFixed(3)}
Exit threshold: ${CONFIG.exitThreshold.toFixed(3)}
Below threshold: ${belowThreshold}
Exit unlocked: ${exitUnlocked ? "yes" : "no"}
Drift speed: ${CONFIG.frameDurationMs} ms/frame
Shuttle speed: ${CONFIG.shuttleFrameDurationMs} ms/frame
Valley overlay: ${CONFIG.debug.valleys ? "on" : "off"}
Debug overlay: ${CONFIG.debug.overlay ? "on" : "off"}`;
    }

    function stopDriftTimer() {
      if (state.frameTimerId) {
        clearTimeout(state.frameTimerId);
        state.frameTimerId = null;
      }
    }

    function startDriftTimer() {
      stopDriftTimer();

      const tick = () => {
        if (state.mode === "drift") {
          renderFrame(nextFrame(state.currentFrame));
          updateDebug();
          state.frameTimerId = window.setTimeout(tick, CONFIG.frameDurationMs);
          return;
        }

        if (state.mode === "shuttle") {
          if (state.currentFrame === CONFIG.entryFrame) {
            completeExit();
            return;
          }

          renderFrame(nextFrame(state.currentFrame));
          updateDebug();
          state.frameTimerId = window.setTimeout(tick, CONFIG.shuttleFrameDurationMs);
        }
      };

      tick();
    }

    function fadeOutJoe(duration = 300) {
      const startVolume = els.joe.volume;
      const startTime = performance.now();

      function step(now) {
        const t = Math.min((now - startTime) / duration, 1);
        els.joe.volume = startVolume * (1 - t);

        if (t < 1) {
          requestAnimationFrame(step);
        } else {
          els.joe.pause();
          els.joe.currentTime = 0;
        }
      }

      requestAnimationFrame(step);
    }

    function beginExit() {
      if (state.mode !== "drift") return;

      state.mode = "shuttle";
      fadeOutJoe(300);
      els.joe.style.display = "none";
      updateDebug();
    }

    function completeExit() {
      state.mode = "complete";
      stopDriftTimer();
      updateDebug();

      if (window.parent && window.parent !== window) {
        window.parent.postMessage({ type: "goto-walls" }, window.location.origin);
      }
    }

    function unlockJoePlayback() {
      if (state.mode !== "drift") return;

      if (els.joe.paused) {
        els.joe.play().catch(err => {
          console.warn("Joe play on gesture failed:", err);
        });
      }

      if (els.joe.muted) {
        els.joe.muted = false;
      }
    }

    function updatePointerPosition(event) {
      const rect = els.app.getBoundingClientRect();

      const rawX = ((event.clientX - rect.left) / rect.width) * STAGE_W;
      const rawY = ((event.clientY - rect.top) / rect.height) * STAGE_H;

      const halfW = CONFIG.joeBaseWidth / 2;
      const halfH = CONFIG.joeBaseHeight / 2;

      state.mouseX = clamp(rawX, halfW, STAGE_W - halfW);
      state.mouseY = clamp(rawY, halfH, STAGE_H - halfH);

      if (performance.now() >= state.exitLockUntil) {
        const dx = state.mouseX - state.entryMouseX;
        const dy = state.mouseY - state.entryMouseY;
        const movedDistance = Math.sqrt(dx * dx + dy * dy);

        if (movedDistance >= CONFIG.exitMovementThreshold) {
          state.hasMovedSinceUnlock = true;
        }
      }
    }

    function updateTouchPosition(touch) {
      const rect = els.app.getBoundingClientRect();

      const rawX = ((touch.clientX - rect.left) / rect.width) * STAGE_W;
      const rawY = ((touch.clientY - rect.top) / rect.height) * STAGE_H;

      const halfW = CONFIG.joeBaseWidth / 2;
      const halfH = CONFIG.joeBaseHeight / 2;

      state.mouseX = clamp(rawX, halfW, STAGE_W - halfW);
      state.mouseY = clamp(rawY, halfH, STAGE_H - halfH);

      if (performance.now() >= state.exitLockUntil) {
        const dx = state.mouseX - state.entryMouseX;
        const dy = state.mouseY - state.entryMouseY;
        const movedDistance = Math.sqrt(dx * dx + dy * dy);

        if (movedDistance >= CONFIG.exitMovementThreshold) {
          state.hasMovedSinceUnlock = true;
        }
      }
    }


    function handlePointerMove(event) {
      if (state.mode !== "drift") return;

      unlockJoePlayback();
      updatePointerPosition(event);
      updateJoe();
      updateDebug();
    }

    function handleTouchStart(event) {
      if (state.mode !== "drift") return;
      if (!event.touches.length) return;

      event.preventDefault();
      unlockJoePlayback();
      updateTouchPosition(event.touches[0]);
      updateJoe();
      updateDebug();
    }

    function handleTouchMove(event) {
      if (state.mode !== "drift") return;
      if (!event.touches.length) return;

      event.preventDefault();
      unlockJoePlayback();
      updateTouchPosition(event.touches[0]);
      updateJoe();
      updateDebug();
    }

    function handleKeydown(event) {
      if (!DEBUG) return;

      const key = event.key.toLowerCase();

      if (key === "d") {
        CONFIG.debug.overlay = !CONFIG.debug.overlay;
        updateDebug();
      }

      if (key === "v") {
        CONFIG.debug.valleys = !CONFIG.debug.valleys;
        drawValleyOverlay();
        updateDebug();
      }

      if (key === "x") {
        if (state.mode === "drift") beginExit();
      }
    }

    async function startExperience() {
      if (state.hasStarted) return;
      state.hasStarted = true;

      els.startOverlay.classList.add("hidden");
      els.joe.style.display = "block";

      state.mode = "drift";
      state.currentFrame = CONFIG.entryFrame;
      state.mouseX = 96;
      state.mouseY = 240;
      state.entryMouseX = 96;
      state.entryMouseY = 240;
      state.hasMovedSinceUnlock = false;
      state.exitLockUntil = performance.now() + CONFIG.exitArmingDelayMs;

      renderFrame(CONFIG.entryFrame);
      updateJoe();
      updateDebug();

      try {
        els.joe.muted = true;
        els.joe.volume = 1;
        await els.joe.play();
      } catch (err) {
        console.warn("Joe video could not autoplay:", err);
      }

      startDriftTimer();
    }

    async function init() {
      renderFrame(CONFIG.entryFrame);
      resizeCanvas();
      updateJoe();
      updateDebug();

      await preloadImages();
      renderFrame(CONFIG.entryFrame);

      window.addEventListener("resize", resizeCanvas);
      window.addEventListener("pointermove", handlePointerMove);
      window.addEventListener("keydown", handleKeydown);

      window.addEventListener("pointerdown", (event) => {
        if (state.mode !== "drift") return;
        unlockJoePlayback();
        updatePointerPosition(event);
        updateJoe();
        updateDebug();
      });

      els.app.addEventListener("touchstart", handleTouchStart, { passive: false });
      els.app.addEventListener("touchmove", handleTouchMove, { passive: false });

      els.startButton.addEventListener("click", startExperience);
      els.startOverlay.addEventListener("click", startExperience);

      const inIframe = window.parent && window.parent !== window;

      if (inIframe) {
        els.startOverlay.classList.add("hidden");
      }
    }

    window.addEventListener("message", (event) => {
      if (event.origin !== window.location.origin) return;

      const data = event.data;
      if (!data || typeof data !== "object") return;

      if (data.type === "suburbia-start") {
        startExperience();
      }
    });

    init().catch(err => {
      console.error("Suburbia failed to initialize:", err);
      alert("Suburbia failed to initialize. Check the console and confirm all image/video paths are correct.");
    });
  </script>
</body>
</html>
